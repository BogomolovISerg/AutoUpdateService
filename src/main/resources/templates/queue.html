<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Очередь</title>
    <link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div class="nav">
    <a href="/">Dashboard</a>
    <a href="/settings">Настройки</a>
    <a href="/queue">Очередь</a>
    <a href="/logs">Логи</a>
    <a href="/account/change-password">Сменить пароль</a>
    <form class="logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="nav-btn" type="submit">Выход</button>
    </form>
</div>

<div class="container">
    <div class="card">
        <h2>Очередь</h2>
        <form method="get" action="/queue" class="row">
            <div>
                <label class="small">С</label>
                <input class="input" type="date" name="from" th:value="${from}"/>
            </div>
            <div>
                <label class="small">по</label>
                <input class="input" type="date" name="to" th:value="${to}"/>
            </div>
            <div>
                <label class="small">Статус</label>
                <select class="input" name="status">
                    <option th:selected="${status == null}" value="">(any)</option>
                    <option th:selected="${status?.name() == 'NEW'}" value="NEW">NEW</option>
                    <option th:selected="${status?.name() == 'CANCELED'}" value="CANCELED">CANCELED</option>
                    <option th:selected="${status?.name() == 'UPDATED'}" value="UPDATED">UPDATED</option>
                </select>
            </div>
            <div class="row-actions">
                <button class="btn" type="submit">Фильтр</button>
                <a class="btn secondary" href="/queue">Сброс</a>
            </div>
        </form>

        <hr/>

        <div class="table-wrap">
            <table class="table  queue-table">
                <thead>
                <tr>
                    <th>created_at</th>
                    <th>project</th>
                    <th>type</th>
                    <th>ext</th>
                    <th>scheduled_for</th>
                    <th>author</th>
                    <th>comment</th>
                    <th>status</th>
                    <th>action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${tasks}">
                    <td th:text="${createdAtFmt[t.id]}">—</td>
                    <td th:text="${t.projectPath}">—</td>
                    <td th:text="${t.targetType}">—</td>
                    <td th:text="${t.extensionName} ?: '—'">—</td>
                    <td th:text="${t.scheduledFor}">—</td>

                    <td th:text="${#strings.isEmpty(t.authorName) ? ( #strings.isEmpty(t.authorLogin) ? '—' : t.authorLogin ) : t.authorName}"
                        th:title="${t.authorLogin}">—</td>

                    <td class="wrap" th:text="${t.comment}">—</td>

                    <td>
    <span class="badge"
          th:classappend="${t.status}"
          th:text="${t.status}">NEW</span>
                    </td>

                    <td>
                        <form th:if="${t.status.name() != 'UPDATED'}"
                              method="post"
                              th:action="@{/queue/{id}/toggle(id=${t.id})}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn secondary" type="submit"
                                    th:text="${t.status.name() == 'NEW'} ? 'Отменить' : 'Вернуть'">Отменить</button>
                        </form>
                        <span th:if="${t.status.name() == 'UPDATED'}" class="small">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pager" th:if="${page != null and page.totalPages > 1}">
            <a class="btn secondary" th:if="${page.hasPrevious()}"
               th:href="@{/queue(page=${page.number}, from=${from}, to=${to}, status=${status})}">← Назад</a>
            <span class="small">Стр. <b th:text="${page.number + 1}">1</b> из <b th:text="${page.totalPages}">1</b>
                · всего <b th:text="${page.totalElements}">0</b></span>
            <a class="btn secondary" th:if="${page.hasNext()}"
               th:href="@{/queue(page=${page.number + 2}, from=${from}, to=${to}, status=${status})}">Вперёд →</a>
        </div>
    </div>
</div>
</body>
</html>
