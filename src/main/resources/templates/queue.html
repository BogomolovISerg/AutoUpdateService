<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Очередь</title>
    <link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div class="nav">
    <a href="/">Dashboard</a>
    <a href="/settings">Настройки</a>
    <a href="/queue">Очередь</a>
    <a href="/logs">Логи</a>
    <a href="/dependencies">Зависимости</a>
    <a href="/account/change-password">Сменить пароль</a>
    <form class="logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="nav-btn" type="submit">Выход</button>
    </form>
</div>

<div class="container">
    <div class="card">
        <h2>Очередь</h2>
        <form method="get" action="/queue" class="row">
            <div>
                <label class="small">С</label>
                <input class="input" type="date" name="from" th:value="${from}"/>
            </div>
            <div>
                <label class="small">по</label>
                <input class="input" type="date" name="to" th:value="${to}"/>
            </div>
            <div>
                <label class="small">Статус</label>
                <select class="input" name="status">
                    <option th:selected="${status == null}" value="">(any)</option>
                    <option th:selected="${status?.name() == 'NEW'}" value="NEW">NEW</option>
                    <option th:selected="${status?.name() == 'TEST_FAILED'}" value="TEST_FAILED">TEST_FAILED</option>
                    <option th:selected="${status?.name() == 'TEST_OK'}" value="TEST_OK">TEST_OK</option>
                    <option th:selected="${status?.name() == 'CANCELED'}" value="CANCELED">CANCELED</option>
                    <option th:selected="${status?.name() == 'UPDATED'}" value="UPDATED">UPDATED</option>
                </select>
            </div>
            <div class="row-actions">
                <button class="btn" type="submit">Фильтр</button>
                <a class="btn secondary" href="/queue">Сброс</a>
            </div>
        </form>
        <div class="pager" style="margin-top:12px;">
            <a class="btn secondary"
               th:if="${page > 1}"
               th:href="@{/queue(page=${page - 1}, from=${from}, to=${to}, status=${status})}">← Назад</a>

            <span class="small">
                Стр. <b th:text="${page}">1</b> из <b th:text="${totalPages}">1</b>
                · всего <b th:text="${totalElements}">0</b>
                · по <b th:text="${pageSize}">50</b>
            </span>

            <a class="btn secondary"
               th:if="${page < totalPages}"
               th:href="@{/queue(page=${page + 1}, from=${from}, to=${to}, status=${status})}">Вперёд →</a>
        </div>

        <hr/>

        <div class="table-wrap">
            <table class="table queue-table">
                <thead>
                <tr>
                    <th>created_at</th>
                    <th>project</th>
                    <th>type</th>
                    <th>ext</th>
                    <th>author</th>
                    <th>comment</th>
                    <th>status</th>
                    <th>action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tasks)}">
                    <td colspan="8" class="small">Записей нет</td>
                </tr>
                <tr th:each="t : ${tasks}">
                    <td th:text="${createdAtFmt[T(java.lang.String).valueOf(t.id)]} ?: '—'">—</td>
                    <td th:text="${t.projectPath}">—</td>
                    <td th:text="${t.targetType}">—</td>
                    <td th:text="${t.extensionName} ?: '—'">—</td>
                    <td th:text="${#strings.isEmpty(t.authorName) ? ( #strings.isEmpty(t.authorLogin) ? '—' : t.authorLogin ) : t.authorName}"
                        th:title="${t.authorLogin}">—</td>
                    <td class="wrap" th:text="${t.comment}">—</td>
                    <td>
                        <span class="badge"
                              th:classappend="${t.status}"
                              th:text="${t.status}">NEW</span>
                    </td>
                    <td>
                        <div class="queue-action">
                            <form th:if="${t.status.name() == 'NEW' or t.status.name() == 'TEST_FAILED' or t.status.name() == 'CANCELED'}"
                                  method="post"
                                  th:action="@{/queue/{id}/toggle(id=${t.id})}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn secondary" type="submit"
                                        th:text="${t.status.name() == 'CANCELED'} ? 'Вернуть' : 'Отменить'">Отменить</button>
                            </form>
                            <button th:if="${t.status.name() == 'TEST_OK'}"
                                    class="btn secondary"
                                    type="button"
                                    disabled>Ждёт prod</button>
                            <button th:if="${t.status.name() == 'UPDATED'}"
                                    class="btn secondary"
                                    type="button"
                                    disabled>Выполнено</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
