<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Подтверждение</title>
    <link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div class="nav">
    <a href="/">Dashboard</a>
    <a href="/settings">Настройки</a>
    <a href="/queue">Очередь</a>
    <a href="/logs">Логи</a>
    <a href="/account/change-password">Сменить пароль</a>
    <form class="logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="nav-btn" type="submit">Выход</button>
    </form>
</div>

<div class="container">
    <div class="card">
        <h2>Выключить автообновление?</h2>
        <p>В очереди новых задач <b th:text="${pendingNewCount}">0</b>.</p>
        <p>Что сделать с ними?</p>

        <form method="post" th:action="@{/settings}" th:object="${form}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <input type="hidden" th:field="*{autoUpdateEnabled}"/>
            <input type="hidden" th:field="*{runTime}"/>
            <input type="hidden" th:field="*{nextRunDate}"/>
            <input type="hidden" th:field="*{timezone}"/>
            <input type="hidden" th:field="*{lockMessage}"/>
            <input type="hidden" th:field="*{uccode}"/>
            <input type="hidden" th:field="*{closedMaxAttempts}"/>
            <input type="hidden" th:field="*{closedSleepSeconds}"/>

            <button class="btn danger" name="cancelPending" value="true" type="submit">Отменить все новые задачи</button>
            <button class="btn" name="cancelPending" value="false" type="submit">Оставить новые (только выключить)</button>
            <a class="btn secondary" href="/settings">Назад</a>
        </form>
    </div>
</div>
</body>
</html>
