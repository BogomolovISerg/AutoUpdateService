<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Лог шага</title>
    <link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div class="nav">
    <a href="/">Dashboard</a>
    <a href="/settings">Настройки</a>
    <a href="/queue">Очередь</a>
    <a href="/logs">Логи</a>
    <a href="/account/change-password">Сменить пароль</a>
    <form class="logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="nav-btn" type="submit">Выход</button>
    </form>
</div>

<div class="container">
    <div class="card">
        <h2>Детали лога</h2>
        <div class="small">
            <div><b>ts:</b> <span th:text="${event.ts}">—</span></div>
            <div><b>type:</b> <span th:text="${event.type}">—</span></div>
            <div><b>level:</b> <span th:text="${event.level}">—</span></div>
            <div><b>actor:</b> <span th:text="${event.actor} ?: '—'">—</span></div>
        </div>
        <div class="wrap" th:text="${event.message}">—</div>

        <div class="row-actions" style="margin-top:12px;">
            <a class="btn secondary" href="/logs">Назад</a>
        </div>
    </div>

    <div class="card" th:if="${#lists.isEmpty(blobs)}">
        <div class="small">Нет сохранённых файлов логов для этой записи.</div>
    </div>

    <div class="card" th:each="b : ${blobs}">
        <h3 th:text="${b.kind}">STDOUT</h3>
        <pre class="log-pre" th:text="${b.content}"></pre>
    </div>
</div>
</body>
</html>
