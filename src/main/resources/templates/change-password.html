<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Смена пароля</title>
    <link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div class="container">
    <div class="card" style="max-width:640px; margin:40px auto;">
        <h2>Смена пароля</h2>
        <p class="small">При первый входе смена пароля обязательно.</p>
        <form method="post" th:action="@{/account/change-password}" th:object="${form}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row" style="flex-direction:column; align-items:stretch;">
                <label>Новый пароль</label>
                <input class="input" type="password" th:field="*{newPassword}"/>
                <label>Повтор нового пароля</label>
                <input class="input" type="password" th:field="*{confirmPassword}"/>
                <button class="btn" type="submit">Сохранить</button>
            </div>
            <p class="small" style="color:#b91c1c;" th:text="${error}" th:if="${error}"></p>
        </form>
    </div>
</div>
</body>
</html>
